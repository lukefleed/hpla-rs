[package]
name = "spmv-bench"
version = "0.1.0"
edition = "2024"
authors = ["SpMV Benchmark Suite"]
description = "High-performance SpMV benchmark using faer and PETSc via FFI"
readme = "README.md"
license = "MIT"

[dependencies]
faer = { version = "0.23", default-features = false, features = ["std"] }
csv = "1.4.0"
serde = { version = "1.0", features = ["derive"] }
clap = { version = "4.5", features = ["derive"] }
matrix-market-rs = "0.1.3"

[dev-dependencies]
criterion = "0.5"

[build-dependencies]
cc = "1.0"

[profile.release]
# Maximum optimization level
opt-level = 3

# Link-Time Optimization: "fat" enables full cross-crate LTO
lto = "fat"

# Single codegen unit forces all code into one LLVM module
codegen-units = 1

# Abort on panic removes unwinding code, reducing binary size
panic = "abort"

# Disable debug info in release builds
debug = false

[profile.release.package."*"]
# Apply same optimizations to dependencies
opt-level = 3

# Benchmark-specific profile with even more aggressive settings
[profile.bench]
inherits = "release"
debug = false

[[bench]]
name = "spmv"
harness = false
